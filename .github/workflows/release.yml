name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Prepare Apple notarization API key
        if: matrix.platform == 'macos'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APPLE_API_KEY_BASE64:-}" ]; then
            echo "No APPLE_API_KEY_BASE64 secret configured; macOS notarization will be skipped."
            exit 0
          fi

          if [ -z "${APPLE_API_KEY_ID:-}" ]; then
            echo "APPLE_API_KEY_ID is required when APPLE_API_KEY_BASE64 is configured." >&2
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Package macOS app
        if: matrix.platform == 'macos'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CSC_LINK:-}" ]; then
            echo "::warning::No CSC_LINK secret configured. Building an unsigned macOS artifact; Gatekeeper may warn or block it."
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          else
            echo "macOS code signing certificate detected; electron-builder will sign the app."
          fi

          if [ -z "${APPLE_API_KEY:-}" ] && { [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; }; then
            echo "::warning::No complete Apple notarization credentials configured. macOS notarization will be skipped."
          else
            echo "Apple notarization credentials detected; electron-builder will notarize the app."
          fi

          pnpm build

          if [ -z "${CSC_LINK:-}" ]; then
            pnpm exec electron-builder --mac --dir --publish never --config.mac.identity=null --config.mac.notarize=false

            app_dir="$(find release -maxdepth 1 -type d -name 'mac*' | head -n 1)"
            if [ -z "$app_dir" ]; then
              echo "Unable to find unpacked macOS app directory." >&2
              exit 1
            fi

            app_path="$(find "$app_dir" -maxdepth 1 -type d -name '*.app' | head -n 1)"
            if [ -z "$app_path" ]; then
              echo "Unable to find unpacked macOS .app bundle." >&2
              exit 1
            fi

            echo "Ad-hoc signing unsigned macOS app at $app_path"
            codesign --force --deep --sign - --options runtime --entitlements build/entitlements.mac.plist "$app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"

            pnpm exec electron-builder --mac dmg zip --prepackaged "$app_dir" --publish never --config.mac.identity=null --config.mac.notarize=false
          else
            pnpm exec electron-builder --mac --publish never
          fi

      - name: Package Windows app
        if: matrix.platform == 'windows'
        run: pnpm dist:win

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slide-web-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: find release-assets -maxdepth 2 -type f -print

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          expected_tag="v${version}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            if [ "$tag" != "$expected_tag" ]; then
              echo "Tag $tag does not match package version $expected_tag" >&2
              exit 1
            fi
          else
            tag="$expected_tag"
          fi
          title="SlideWeb ${tag}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${tag}$" | head -n 1 || true)"

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "title=${title}"
            echo "previous_tag=${previous_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          set -euo pipefail

          range="${TAG}"
          full_changelog_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          if [ -n "${PREVIOUS_TAG}" ]; then
            range="${PREVIOUS_TAG}..${TAG}"
            full_changelog_url="https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG}"
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          commits_file="$RUNNER_TEMP/release-commits.tsv"
          used_file="$RUNNER_TEMP/release-used-shas.txt"
          git log --format='%H%x09%s' "$range" > "$commits_file"
          : > "$used_file"

          write_section() {
            local title="$1"
            local pattern="$2"
            local strip_prefix="$3"
            local tmp_file="$RUNNER_TEMP/section-${title// /-}.md"
            : > "$tmp_file"

            while IFS=$'\t' read -r sha subject; do
              [ -n "$sha" ] || continue
              if grep -qx "$sha" "$used_file"; then
                continue
              fi
              if [[ "$subject" =~ $pattern ]]; then
                short="${sha:0:7}"
                clean="$subject"
                if [ "$strip_prefix" = "true" ]; then
                  clean="$(printf '%s' "$clean" | sed -E 's/^[A-Za-z]+(\([^)]+\))?!?:[[:space:]]*//')"
                fi
                printf -- '- %s ([%s](https://github.com/%s/commit/%s))\n' "$clean" "$short" "$GITHUB_REPOSITORY" "$sha" >> "$tmp_file"
                echo "$sha" >> "$used_file"
              fi
            done < "$commits_file"

            if [ -s "$tmp_file" ]; then
              {
                printf '## %s\n\n' "$title"
                cat "$tmp_file"
                printf '\n'
              } >> "$notes_file"
            fi
          }

          : > "$notes_file"
          write_section "Features" '^(feat|feature)(\([^)]+\))?!?:|^[Ii]mplement |^[Aa]dd (in-app|app|application|settings|GitHub|release|search|support|icon)' "true"
          write_section "Bug Fixes" '^(fix)(\([^)]+\))?!?:|^[Ff]ix ' "true"
          write_section "Build" '^(build|ci)(\([^)]+\))?!?:|^[Rr]elease |workflow|package|packaged|signing|tag' "true"
          write_section "Documentation" '^(docs?)(\([^)]+\))?!?:|README|CHANGELOG|changelog|document' "true"
          write_section "Refactoring" '^(refactor)(\([^)]+\))?!?:' "true"
          write_section "Styles" '^(style)(\([^)]+\))?!?:|style|UI|icon' "true"

          other_file="$RUNNER_TEMP/section-other.md"
          : > "$other_file"
          while IFS=$'\t' read -r sha subject; do
            [ -n "$sha" ] || continue
            if grep -qx "$sha" "$used_file"; then
              continue
            fi
            short="${sha:0:7}"
            printf -- '- %s ([%s](https://github.com/%s/commit/%s))\n' "$subject" "$short" "$GITHUB_REPOSITORY" "$sha" >> "$other_file"
          done < "$commits_file"

          if [ -s "$other_file" ]; then
            {
              printf '## Other Changes\n\n'
              cat "$other_file"
              printf '\n'
            } >> "$notes_file"
          fi

          {
            printf '**Full Changelog**: [%s...%s](%s)\n' "${PREVIOUS_TAG:-initial}" "$TAG" "$full_changelog_url"
          } >> "$notes_file"

          cat "$notes_file"
          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
          TITLE: ${{ steps.version.outputs.title }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.file }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --cleanup-tag --yes
          fi

          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          gh release create "$TAG" "${files[@]}" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes-file "$RELEASE_NOTES_FILE" \
            --latest
