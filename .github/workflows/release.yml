name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Prepare Apple notarization API key
        if: matrix.platform == 'macos'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APPLE_API_KEY_BASE64:-}" ]; then
            echo "No APPLE_API_KEY_BASE64 secret configured; macOS notarization will be skipped."
            exit 0
          fi

          if [ -z "${APPLE_API_KEY_ID:-}" ]; then
            echo "APPLE_API_KEY_ID is required when APPLE_API_KEY_BASE64 is configured." >&2
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Package macOS app
        if: matrix.platform == 'macos'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CSC_LINK:-}" ]; then
            echo "::warning::No CSC_LINK secret configured. Building an unsigned macOS artifact; Gatekeeper may warn or block it."
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          else
            echo "macOS code signing certificate detected; electron-builder will sign the app."
          fi

          if [ -z "${APPLE_API_KEY:-}" ] && { [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; }; then
            echo "::warning::No complete Apple notarization credentials configured. macOS notarization will be skipped."
          else
            echo "Apple notarization credentials detected; electron-builder will notarize the app."
          fi

          pnpm build

          if [ -z "${CSC_LINK:-}" ]; then
            pnpm exec electron-builder --mac --publish never --config.mac.identity=null --config.mac.notarize=false
          else
            pnpm exec electron-builder --mac --publish never
          fi

      - name: Package Windows app
        if: matrix.platform == 'windows'
        run: pnpm dist:win

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slide-web-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          tag="release-${short_sha}"
          title="Slide Web ${short_sha}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --cleanup-tag --yes
          fi

          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          gh release create "$tag" "${files[@]}" \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --notes "Automated release for commit ${GITHUB_SHA}." \
            --latest
